<script>

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const SK="movatis_v3";
const DEMO={};
const PRODS={RITOCAL_GR:{n:"RITOCAL GR",r:"PM-531"},ACTIBON:{n:"ACTIBON SHOCK",r:"PM-420"},ALGIKLEAN:{n:"ALGIKLEAN",r:"PM-634"},ALGI_YELLOW:{n:"ALGI-YELLOW",r:"PM-654"},PH_MOINS:{n:"pH MOINS",r:"PM-601"},TAC_PLUS:{n:"TAC PLUS",r:"PM-612"},STABILISANT:{n:"STABILISANT",r:"PM-401"},PHOS_OUT:{n:"PHOS-OUT",r:"PM-625"},BIOFILM_OUT:{n:"BIOFILM OUT",r:"PM-630"},ULTRA_CLEAR:{n:"ULTRA CLEAR",r:"PM-643"},ION_MAGNETIC:{n:"ION MAGNETIC",r:"PM-615"},STICKS_CTX:{n:"Sticks chlore non stabilisГ©",r:"CTX-123"},CELNET:{n:"CELNET",r:"PM-142"}};
const PR={FCL:{min:1,max:3,u:"mg/L",lb:"Chlore Libre"},TCL:{min:1,max:3.6,u:"mg/L",lb:"Chlore Total"},pH:{min:7,max:7.4,u:"",lb:"pH"},TAC:{min:80,max:180,u:"mg/L",lb:"TAC / ALK"},TH:{min:150,max:350,u:"mg/L",lb:"TH / HARD"},CYA:{min:20,max:40,u:"mg/L",lb:"CYA (Stab.)"},Fe:{min:0,max:0.2,u:"mg/L",lb:"Fer / IRON"},Cu:{min:0,max:0.1,u:"mg/L",lb:"Cuivre / COPPER"},Phos:{min:0,max:100,u:"ppb",lb:"Phosphates / PHOS"}};
const PKS=Object.keys(PR);
const ML={chlore_non_stab:"Sticks non stab.",chlore_stab:"Chlore stab.",electrolyseur:"Гүlectrolyse",uv:"UV",brome:"Brome"};
const COL={FCL:"#38bdf8",TCL:"#818cf8",pH:"#4ade80",TAC:"#fb923c",TH:"#f472b6",CYA:"#facc15",Fe:"#f87171",Cu:"#a78bfa",Phos:"#34d399"};

function lsLoad(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch{}localStorage.setItem(SK,JSON.stringify(DEMO));return JSON.parse(JSON.stringify(DEMO));}

function dot(v,k){
  if(v===""||v===null||v===undefined)return"вҡӘ";
  const r=PR[k];if(!r)return"вҡӘ";
  const n=parseFloat(v);if(isNaN(n))return"вҡӘ";
  if(n>=r.min&&n<=r.max)return"рҹҹў";
  const p=(r.max-r.min)*.25||.5;
  if((n>=r.min-p&&n<r.min)||(n>r.max&&n<=r.max+p))return"рҹҹ ";
  return"рҹ”ҙ";
}
function inpCls(v,k){if(!v)return"";const d=dot(v,k);return d==="рҹҹў"?"inp-ok":d==="рҹҹ "?"inp-w":"inp-e";}

function calcLSI(pH,TH,TAC,t=28){
  if(!pH||!TH||!TAC)return null;
  const f=t<=15?.5:t<=20?.6:t<=25?.7:.8;
  return(parseFloat(pH)-(12.1-Math.log10(parseFloat(TH))-Math.log10(parseFloat(TAC))-f)).toFixed(2);
}

function buildPres(vals,vol,mode,aspect,algM){
  const at=[],ac=[],pr={},wa=[];
  const fcl=parseFloat(vals.FCL)||0,ph=parseFloat(vals.pH)||0,tac=parseFloat(vals.TAC)||0,th=parseFloat(vals.TH)||0,cya=parseFloat(vals.CYA),phos=parseFloat(vals.Phos)||0;
  const cc=(parseFloat(vals.TCL)||0)-fcl;
  const isV=aspect==="verte_lГ©gГЁre"||aspect==="verte_dense";
  const isD=aspect==="verte_dense"||aspect==="noire_marron";
  if(cc>0.6)wa.push("вҡ пёҸ Chlore combinГ© > 0,6 mg/L вҖ” traitement choc obligatoire");
  if(isD){
    at.push("Laver le filtre AVANT tout traitement");at.push("Brosser les parois");
    pr.BIOFILM_OUT=Math.round(vol*5)+" mL";at.push("BIOFILM OUT вҶ’ "+pr.BIOFILM_OUT);
    if(fcl<0.5){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR вҶ’ "+pr.RITOCAL_GR+" вҖ” rГ©partir plan d'eau, filtration en marche");}
    pr.ACTIBON=Math.round(vol*10)+" mL";at.push("ACTIBON SHOCK вҶ’ "+pr.ACTIBON+" (Г—2) вҖ” soirГ©e");
    pr.ALGIKLEAN=Math.round(vol*20)+" mL";at.push("ALGIKLEAN вҶ’ "+pr.ALGIKLEAN+" вҖ” filtration en marche");
    pr.ULTRA_CLEAR=Math.round(vol*10)+" mL";at.push("ULTRA CLEAR вҶ’ "+pr.ULTRA_CLEAR);
    ac.push("Filtration 24h/24 pendant 48вҖ“72h");ac.push("Laver le filtre Г  nouveau 24h aprГЁs");ac.push("Ne pas baigner tant que l'eau n'est pas claire");ac.push("Ne pas poser les sticks avant eau claire + conditions OK");
    if(mode==="electrolyseur"){ac.push("Ne pas remettre l'Г©lectrolyseur avant eau claire + pH 7,0вҖ“7,4 + TAC > 80");wa.push("вҡ пёҸ Гүlectrolyseur : proposer CELNET");pr.CELNET="Selon encrassement";}
  }else if(aspect==="verte_lГ©gГЁre"){
    at.push("Brosser les parois");
    if(fcl<0.5){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR вҶ’ "+pr.RITOCAL_GR);}
    pr.ALGIKLEAN=Math.round(vol*20)+" mL";at.push("ALGIKLEAN вҶ’ "+pr.ALGIKLEAN+" вҖ” filtration en marche");
    pr.ACTIBON=Math.round(vol*5)+" mL";at.push("ACTIBON SHOCK вҶ’ "+pr.ACTIBON+" вҖ” soirГ©e");
    ac.push("Laver filtre 24h aprГЁs");ac.push("Filtration 24h/24 pendant 48h");ac.push("Ne pas baigner вҖ” FCL вүҘ 1 mg/L + eau claire requis");
  }
  if(algM){pr.ALGI_YELLOW=Math.round(vol*10)+" mL";at.push("ALGI-YELLOW вҶ’ "+pr.ALGI_YELLOW+" вҖ” surchloration cible 5 mg/L");wa.push("вҡ пёҸ Algues moutarde : surchloration 5 mg/L requise");}
  if(ph>(isV?6.9:7.5)&&ph>0){const d=Math.round(vol*10*((ph-(isV?6.8:7.2))/0.3));pr.PH_MOINS=d+" g";at.push("pH MOINS PM-601 вҶ’ "+d+" g вҖ” 10g/mВі par -0,3 unitГ©, en 3 fois, filtration 1h aprГЁs");}
  if(tac>0&&tac<80){
    if(ph<6.3)wa.push("рҹ”ҙ pH < 6,3 вҖ” NE PAS ajouter TAC PLUS. Corriger pH d'abord.");
    else{const dl=80-tac,d=Math.round(dl*vol*1.7);pr.TAC_PLUS=d+" g";at.push("TAC PLUS вҶ’ "+d+" g"+(dl>20?" (correction massive)":""));if(dl>30){ac.push("Filtration 24h/24 pendant la correction TAC");ac.push("Couper la rГ©gulation pH automatique");wa.push("вҡ пёҸ Correction TAC massive вҖ” filtration 24h + couper rГ©gulation pH auto");}}
  }
  if(th>0&&th<150)wa.push("вҡ пёҸ TH < 150 mg/L вҖ” eau agressive.");
  if(!isNaN(cya)){if(cya<20){const d=Math.round((30-cya)*vol*1);pr.STABILISANT=d+" g";at.push("STABILISANT PM-401 вҶ’ "+d+" g вҖ” 10g/mВі par +10ppm, 48h pour agir вҖ” prГ©venir client");wa.push("вҡ пёҸ CYA < 20 mg/L вҖ” STABILISANT obligatoire. Met 48h Г  agir.");}else if(cya>60)wa.push("вҡ пёҸ CYA > 60 mg/L вҖ” surveiller, risque blocage chlore.");}
  if(phos>100){const d=phos<=200?Math.round(vol*3):phos<=500?Math.round(vol*6):phos<=1000?Math.round(vol*12):Math.round(vol*24);pr.PHOS_OUT=d+" mL";at.push("PHOS-OUT вҶ’ "+d+" mL вҖ” traiter AVANT l'algicide");wa.push("вҡ пёҸ Phosphates > 100 ppb вҖ” PHOS-OUT avant algicide");}
  if((parseFloat(vals.Fe)||0)>0.2||(parseFloat(vals.Cu)||0)>0.1){pr.ION_MAGNETIC="ГҖ Г©valuer";wa.push("вҡ пёҸ MГ©taux dГ©tectГ©s вҖ” ION MAGNETIC recommandГ©");}
  if(aspect==="claire"&&mode!=="electrolyseur"){const n=Math.ceil(vol/20);pr.STICKS_CTX=n+" stick(s) / 5 jours";at.push("Poser "+n+" stick(s) skimmer вҖ” film intact, panier propre");}
  if(mode==="electrolyseur"&&fcl<0.5&&!pr.RITOCAL_GR){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR вҶ’ "+pr.RITOCAL_GR+" вҖ” amorГ§age Г©lectrolyseur");wa.push("вҡ пёҸ Гүlectrolyseur : amorcer RITOCAL GR avant remise en route");}
  return{actions_tech:at,actions_client:ac,products:pr,warnings:wa};
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CLAUDE API
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function claude(messages,max=600){
  if(!S.apiKey){throw new Error("ClГ© API manquante вҖ” configure-la dans вҡҷпёҸ ParamГЁtres");}
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":S.apiKey},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages})});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`API ${r.status}: ${t.slice(0,120)}`);}
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"Erreur API Claude");
  const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return{};}
}
async function readPhoto(b64,mime){return claude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:'Analyse cette image de test d\'eau de piscine. Il peut s\'agir d\'une BANDELETTE colorimГ©trique (Hach, Bayrol, AquaChek, Marina...) tenue devant son flacon avec l\'Г©chelle de rГ©fГ©rence, ou d\'un PHOTOMГҲTRE numГ©rique (PoolLab, Scuba II, eXact...), ou d\'un comparateur liquide.\n\nPOUR UNE BANDELETTE : compare soigneusement les couleurs de chaque plage de la bandelette avec l\'Г©chelle imprimГ©e sur le flacon. Chaque plage correspond Г  un paramГЁtre. La lecture est approximative вҖ” retourne la valeur de l\'Г©chelle la plus proche de la couleur observГ©e.\n\nJSON STRICT uniquement, aucun texte avant ou aprГЁs :\n{"FCL":null,"TCL":null,"pH":null,"TAC":null,"TH":null,"CYA":null,"Fe":null,"Cu":null,"Phos":null}\n\nCorrespondances : FCL=Free Chlorine/Chlore Libre(mg/L), TCL=Total Chlorine(mg/L), pH=valeur pH, TAC=Alkalinity/AlcalinitГ©(ppm), TH=Hardness/TH(ppm), CYA=Stabilizer/Stabilisant(ppm), Fe=Iron/Fer(mg/L), Cu=Copper/Cuivre(mg/L), Phos=Phosphates(ppb). Nombres uniquement, null si absent ou illisible.'}]}],500);}
async function readHTH(b64){return claude([{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:'Rapport HTH Test\'O Pro. Extrais UNIQUEMENT les valeurs mesurГ©es (pas les idГ©ales). JSON STRICT:\n{"clientName":null,"date":null,"TAC":null,"pH":null,"CYA":null,"FCL":null,"CCL":null,"salt":null,"TH":null,"Cu":null,"Fe":null,"Phos":null,"volume":null,"mode":null}\nclientName=nom client, date=JJ/MM/AAAA, TAC=ALK, FCL=F Cl (chlore libre), CCL=chlore combinГ©, TH=HARD, Cu=COPPER, Fe=IRON, Phos=PHOS(ppb), volume=mВі, mode="electrolyseur"/"chlore_non_stab"/"chlore_stab"/"brome"/"uv"/null. Ne pas extraire les recommandations HTH.'}]}],600);}

async function driveSave(clients){
  const FOLDER="1pplP7oC8Vkue24sWScSTqkOamC5AP0Fx";
  const NAME="movatis_backup.json";
  const tok=S.gtoken;
  if(!tok)throw new Error("Token Google manquant вҖ” utilise le bouton рҹ”‘ Connecter Drive");
  const body=JSON.stringify(clients);
  const q=encodeURIComponent(`name='${NAME}' and '${FOLDER}' in parents and trashed=false`);
  const ls=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:"Bearer "+tok}});
  if(!ls.ok)throw new Error("Drive list "+ls.status);
  const ld=await ls.json();
  const fid=ld.files?.[0]?.id;
  const meta=fid?JSON.stringify({name:NAME}):JSON.stringify({name:NAME,parents:[FOLDER]});
  const form=new FormData();
  form.append("metadata",new Blob([meta],{type:"application/json"}));
  form.append("file",new Blob([body],{type:"application/json"}));
  const url=fid
    ?`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=multipart`
    :`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r=await fetch(url,{method:fid?"PATCH":"POST",headers:{Authorization:"Bearer "+tok},body:form});
  if(!r.ok){const t=await r.text();throw new Error("Drive save "+r.status+": "+t.slice(0,120));}
}
async function driveLoad(){
  const FOLDER="1pplP7oC8Vkue24sWScSTqkOamC5AP0Fx";
  const NAME="movatis_backup.json";
  const tok=S.gtoken;
  if(!tok)throw new Error("Token Google manquant вҖ” utilise le bouton рҹ”‘ Connecter Drive");
  const q=encodeURIComponent(`name='${NAME}' and '${FOLDER}' in parents and trashed=false`);
  const ls=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:"Bearer "+tok}});
  if(!ls.ok)throw new Error("Drive list "+ls.status);
  const ld=await ls.json();
  const fid=ld.files?.[0]?.id;
  if(!fid)return null;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{Authorization:"Bearer "+tok}});
  if(!r.ok)return null;
  try{return await r.json();}catch{return null;}
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function e(s){if(!s&&s!==0)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function j(o){return JSON.stringify(o).replace(/</g,"\\u003c").replace(/"/g,"&quot;");}

function spark(data,color,w=180,h=44,tMin=null,tMax=null){
  if(!data||data.length<2)return"<span style='color:#555;font-size:11px'>вҖ”</span>";
  const vs=data.map(d=>parseFloat(d)||0);
  const allV=[...vs];if(tMin!==null)allV.push(tMin);if(tMax!==null)allV.push(tMax);
  const mn=Math.min(...allV),mx=Math.max(...allV),rng=mx-mn||1;
  const pad=3;
  function yp(v){return h-((v-mn)/rng)*(h-pad*2)-pad;}
  const pts=vs.map((v,i)=>`${(i/(vs.length-1))*w},${yp(v)}`).join(" ");
  const zone=(tMin!==null&&tMax!==null)?`<rect x="0" y="${yp(tMax)}" width="${w}" height="${Math.abs(yp(tMin)-yp(tMax))}" fill="#22c55e14" rx="2"/>` :"";
  const lMin=tMin!==null?`<line x1="0" y1="${yp(tMin)}" x2="${w}" y2="${yp(tMin)}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.75"/><text x="${w+4}" y="${yp(tMin)+4}" font-size="8" fill="#22c55e" opacity="0.9">${tMin}</text>`:"";
  const lMax=tMax!==null?`<line x1="0" y1="${yp(tMax)}" x2="${w}" y2="${yp(tMax)}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.75"/><text x="${w+4}" y="${yp(tMax)+4}" font-size="8" fill="#22c55e" opacity="0.9">${tMax}</text>`:"";
  return`<svg width="${w+32}" height="${h}" style="overflow:visible">${zone}${lMin}${lMax}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${vs.map((v,i)=>{const x=(i/(vs.length-1))*w,y=yp(v);return`<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"/>`;}).join("")}</svg>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function render(){
  const app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=buildAll();
  if(S.showHTH)document.body.style.overflow="hidden";
  else document.body.style.overflow="";
}

function buildAll(){
  const {screen,clients,sel,pres,showHTH}=S;
  const client=sel?clients[sel]:null;
  const analyses=client?.analyses||[];
  let h=showHTH?buildHTH():"";
  if(screen==="home")h+=buildHome();
  else if(screen==="client"&&client)h+=buildClient(client,analyses);
  else if(screen==="analyse"&&client)h+=buildAnalyse(client);
  else if(screen==="ordonnance"&&pres&&client)h+=buildOrd(pres,client);
  else if(screen==="history"&&client)h+=buildHist(client,analyses);
  return h;
}

function buildOrd(p,client){
  const L=calcLSI(p.vals.pH,p.vals.TH,p.vals.TAC);
  const lC=!L?"#94a3b8":parseFloat(L)<-0.3?"#f87171":parseFloat(L)>0.3?"#fb923c":"#4ade80";
  const lL=!L?"вҖ”":parseFloat(L)<-0.3?"Eau agressive":parseFloat(L)>0.3?"Eau incrustante":"Eau Г©quilibrГ©e";
  const isVert=p.aspect==="verte_lГ©gГЁre"||p.aspect==="verte_dense"||p.aspect==="noire_marron";
  const mailReleves=Object.entries(PR).filter(([k])=>p.vals[k]).map(([k,r])=>{
    const v=p.vals[k],d=dot(v,k);
    const ic=d==="рҹҹў"?"рҹҹў":d==="рҹҹ "?"рҹҹ ":"рҹ”ҙ";
    const st=d==="рҹҹў"?"вң“":d==="рҹҹ "?"Г  corriger":"hors cible";
    const lb=(r.lb+" ").padEnd(20,"В·");
    return`${ic} ${lb}: ${v}${r.u?" "+r.u:""}   (cible ${r.min}вҖ“${r.max}${r.u?" "+r.u:""})  ${st}`;
  }).join("\n");
  const sectionFait=p.filtreLave
    ?`в”Ғв”Ғв”Ғ рҹ”§ CE QUE NOUS AVONS FAIT в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\nвҖў Analyse complГЁte de l'eau\nвҖў Traitement correctif effectuГ© sur place\nвҖў Filtre nettoyГ© lors de notre intervention\n\n`
    :`в”Ғв”Ғв”Ғ рҹ”§ CE QUE NOUS AVONS FAIT в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\nвҖў Analyse complГЁte de l'eau\nвҖў Traitement correctif effectuГ© sur place\n\n`;
  const ligneFiltre=isVert?`вҡ пёҸ  FILTRE вҖ” Relaver impГ©rativement le filtre 24h aprГЁs notre passage puis dans 48h se rГ©fГ©rer au manomГЁtre\n\n`:``;
  const ligneFiltration=(p.filtrationMode==="manuel")
    ?`вҡҷпёҸ  FILTRATION вҖ” Laisser tourner en manuel 24h/24 jusqu'Г  ce que l'eau s'Г©claircisse\n\n`
    :`вҡҷпёҸ  FILTRATION вҖ” Reprendre le programme habituel\n\n`;
  const excl=["filtre","filtration","ne pas baigner","ne pas poser les sticks","ne pas remettre l'Г©lectrolyseur","redox"];
  const actClient=p.pres.actions_client.filter(a=>!excl.some(x=>a.toLowerCase().includes(x))).map((a,i)=>`${i+1}пёҸвғЈ  ${a}`).join("\n");
  const actVertes=isVert?`1пёҸвғЈ  Ne pas baigner tant que l'eau n'est pas claire\n2пёҸвғЈ  Ne pas poser les sticks avant eau claire + conditions OK${client.mode==="electrolyseur"?"\n3пёҸвғЈ  Ne pas remettre l'Г©lectrolyseur avant eau claire + pH 7,0вҖ“7,4 + TAC > 80":""}\n\n`:``;
  const ligneCtrl=isVert?`рҹ“…  Refaire une mesure dans 48h et reprendre le traitement normal\n\n`:``;
  const mail=`Bonjour,\n\nSuite Г  notre passage du ${p.date}, voici le bilan de votre piscine (${client.vol} mВі).\n\nв”Ғв”Ғв”Ғ рҹ“Ҡ RELEVГүS DU JOUR в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n${mailReleves}\n\n${sectionFait}в”Ғв”Ғв”Ғ вң… VOS ACTIONS DANS LES 48H в”Ғв”Ғв”Ғв”Ғв”Ғ\n\n${ligneFiltre}${ligneFiltration}${actVertes}${actClient?actClient+"\n\n":""}${ligneCtrl}в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\nN'hГ©sitez pas Г  nous contacter pour toute question.\n\nCordialement,`;

  let h=`<div class="screen">
<div class="hdr">
  <button class="hdr-back" onclick="set({screen:'client'})">вҶҗ ${e(client.name)}</button>
  <div class="hdr-logo">рҹ“Ӣ Ordonnance</div>
  <div class="hdr-sub">${p.date} В· ${client.vol} mВі В· ${(p.aspect||"").replace("_"," ")}${p.sourceHTH?" В· HTH":""}</div>
</div>
<div class="pad">`;

  if(p.sourceHTH)h+=`<div class="card" style="background:#0d2a50;border-color:#2563eb;font-size:12px;color:#7dd3fc;margin-bottom:12px">рҹ“„ Analyse importГ©e depuis HTH Test'O Pro вҖ” confirmez l'aspect de l'eau sur place si besoin</div>`;
  p.pres.warnings.forEach(w=>h+=`<div class="warn-box">${e(w)}</div>`);

  h+=`<div class="card"><div class="sec">RelevГ©s</div><table>
<thead><tr style="border-bottom:1px solid #1a3356"><th style="text-align:left">ParamГЁtre</th><th style="text-align:center">MesurГ©</th><th style="text-align:center">Cible</th><th style="text-align:center">Statut</th></tr></thead>
<tbody>`;
  PKS.forEach(k=>{if(p.vals[k])h+=`<tr><td style="font-size:12px">${PR[k].lb}</td><td style="text-align:center;font-weight:700">${p.vals[k]}${PR[k].u?" "+PR[k].u:""}</td><td style="text-align:center;font-size:11px;color:#475569">${PR[k].min}вҖ“${PR[k].max}</td><td style="text-align:center;font-size:18px">${dot(p.vals[k],k)}</td></tr>`;});
  h+=`</tbody></table></div>`;

  h+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
  <div><div class="sec" style="margin-bottom:0">Indice LSI</div><div style="font-size:11px;color:#475569;margin-top:4px">${lL}</div></div>
  <div style="font-size:28px;font-weight:800;color:${lC}">${L||"вҖ”"}</div>
</div>`;

  if(p.pres.actions_tech.length){
    h+=`<div class="card"><div class="sec">рҹ”§ Actions technicien</div>`;
    p.pres.actions_tech.forEach((a,i)=>h+=`<div style="display:flex;gap:10px;margin-bottom:10px"><div style="background:#38bdf8;color:#070d1a;border-radius:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px">${i+1}</div><div style="font-size:13px;line-height:1.5">${e(a)}</div></div>`);

    h+=`<div class="card" style="background:#080f20"><div class="sec">рҹҡӣ RГ©cap camion</div><table>
<thead><tr style="border-bottom:1px solid #1a3356"><th style="text-align:left">Produit</th><th style="text-align:right">QuantitГ©</th></tr></thead><tbody>`;
    Object.entries(p.pres.products).forEach(([k,q])=>h+=`<tr><td style="padding:7px 0"><div style="font-weight:600">${e(PRODS[k]?.n||k)}</div><div style="font-size:10px;color:#334155">${e(PRODS[k]?.r||"")}</div></td><td style="text-align:right;font-weight:700;color:#38bdf8">${e(q)}</td></tr>`);
    h+=`</tbody></table></div>`;
  }
  if(client.mode!=="electrolyseur"&&p.aspect==="claire")h+=`<div class="card"><div class="sec">вҡҷпёҸ Entretien courant</div><div style="font-size:13px;line-height:1.9">вҖў ${Math.ceil(client.vol/20)} stick(s) / 5 jours вҖ” skimmer, film intact<br>вҖў pH 7,0вҖ“7,4 В· TAC 80вҖ“180 В· CYA 20вҖ“40 mg/L</div></div>`;
  if(client.mode==="electrolyseur"&&p.aspect==="claire")h+=`<div class="card"><div class="sec">вҡҷпёҸ Гүlectrolyseur</div><div style="font-size:13px;line-height:1.9">вҖў Redox 650вҖ“750 mV вҖ” production 30вҖ“40%<br>вҖў pH 7,0вҖ“7,4 В· TAC 80вҖ“180 В· CYA 20вҖ“40 mg/L</div></div>`;
  h+=`<div class="card"><div class="sec">вңүпёҸ Mail client</div>
<textarea id="mailTxt" readonly style="height:220px;font-size:11px;font-family:monospace;line-height:1.6">${e(mail)}</textarea>
<button class="btn" onclick="copyMail()">рҹ“Ӣ Copier le mail</button>
</div>

  return h;
}

// в”Җв”Җ HISTORY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildHist(client,analyses){
  let h=`<div class="screen">
<div class="hdr">
  <button class="hdr-back" onclick="set({screen:'client'})">вҶҗ ${e(client.name)}</button>
  <div class="hdr-logo">рҹ“Ҳ Гүvolution</div>
  <div class="hdr-sub">${analyses.length} analyses В· ${analyses[0]?.date} вҶ’ ${analyses[analyses.length-1]?.date}</div>
</div>
<div class="pad">`;
  PKS.forEach(k=>{
    const sa=[...analyses].sort((a,b)=>a.ts-b.ts);const pts=sa.map(a=>a.vals[k]).filter(v=>v!==""&&v!==undefined&&v!==null);
    if(!pts.length)return;
    const last=pts[pts.length-1];
    h+=`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div><span style="font-weight:700;font-size:14px">${PR[k].lb}</span><span style="font-size:11px;color:#475569;margin-left:6px">${PR[k].u}</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:800;font-size:16px;color:${COL[k]}">${last}</span><span style="font-size:18px">${dot(last,k)}</span></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:flex-end">
    ${spark(pts,COL[k],180,44,PR[k].min,PR[k].max)}
    <div style="font-size:10px;color:#334155;text-align:right">${sa.filter(a=>a.vals[k]).map(a=>`<div>${a.date}: <b style="color:${COL[k]}">${a.vals[k]}</b></div>`).join("")}</div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:#334155;margin-top:6px"><span>Min : ${PR[k].min}</span><span>Max : ${PR[k].max}</span></div>
</div>`;
  });
  h+=`<button class="btn-g" onclick="set({screen:'client'})">вҶҗ Retour</button></div></div>`;
  return h;
}

function buildHTH(){
  const {hthStep,hthProg,hthRes,hthDone,clients}=S;
  const ok=hthRes.filter(r=>r.status==="ok").length;
  const dup=hthRes.filter(r=>r.status==="doublon").length;
  const err=hthRes.filter(r=>r.status==="error").length;
  let inner="";

  if(hthStep==="upload"){
    inner=`<div style="background:#070d1a;border:2px dashed #1e4976;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer" onclick="document.getElementById('hthF').click()">

</div>
<input type="file" id="hthF" accept="application/pdf" multiple style="display:none" onchange="onHTH(this)"/>`;

  if(hthStep==="processing"){
    const pct=hthProg.t?Math.round(hthProg.c/hthProg.t*100):0;
    inner=`<div style="text-align:center;padding:24px 0">
  <div style="font-size:36px;margin-bottom:12px">вҸі</div>

  if(hthStep==="results"){

  <div class="stat" style="background:#1a2a0a;border:1px solid #3a4a1a"><div class="n" style="color:#facc15">${dup}</div><div class="l">Doublons</div></div>
  <div class="stat" style="background:#2a0a0a;border:1px solid #7f1d1d"><div class="n" style="color:#f87171">${err}</div><div class="l">Erreurs</div></div>
</div>`;

    hthRes.forEach((r,idx)=>{
      const bc=r.status==="doublon"?"#3a4a1a":r.status==="error"?"#7f1d1d":"#1e4976";
      const sc=r.status==="ok"?"#4ade80":r.status==="doublon"?"#facc15":"#f87171";
      const sl=r.status==="ok"?"вң… OK":r.status==="doublon"?"вҡ пёҸ Doublon":"вқҢ Erreur";
      inner+=`<div style="background:#070d1a;border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid ${bc}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.parsed?6:0}px">
    <div style="font-size:11px;color:#64748b;flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(r.fileName)}</div>
    <div style="font-size:11px;font-weight:700;color:${sc};flex-shrink:0">${sl}</div>
  </div>`;
      if(r.status==="error")inner+=`<div style="font-size:11px;color:#f87171">${e(r.error)}</div>`;
      if(r.parsed){
        const mc=r.clientId?clients[r.clientId]:null;
        inner+=`<div style="font-weight:700;font-size:14px;color:#e2e8f0">${e(r.parsed.clientName||"вҖ”")}</div>

        if(r.status==="doublon")inner+=`<div style="font-size:11px;color:#facc15;margin-top:4px">Analyse du ${e(r.parsed.date)} dГ©jГ  prГ©sente вҖ” ignorГ©e</div>`;
        if(r.status==="ok"){
          if(mc&&!r.createNew){
            inner+=`<div style="font-size:11px;color:#4ade80;margin-top:4px">вҶ’ ${e(mc.name)} (${mc.vol} mВі) <button onclick="hthCreate(${idx},true)" style="background:none;border:none;color:#475569;font-size:10px;cursor:pointer;margin-left:4px">Changer вҶ’</button></div>`;
          }else{
            inner+=`<div style="margin-top:8px"><div style="font-size:10px;color:#fb923c;font-weight:700;margin-bottom:6px">вҡ пёҸ Nouveau client вҖ” volume requis</div>

  <div><div style="font-size:10px;color:#64748b;margin-bottom:3px">Mode</div>
    <select style="padding:7px 10px;font-size:11px;margin-bottom:0" onchange="hthMode(${idx},this.value)">
      ${["chlore_non_stab","chlore_stab","electrolyseur","uv","brome"].map(m=>`<option value="${m}"${r.newMode===m?" selected":""}>${ML[m]}</option>`).join("")}

    });

    if(ok>0)inner+=`<button class="btn btn-ok" onclick="confirmHTH()">вң… Importer ${ok} analyse${ok>1?"s":""}${dup>0?" В· "+dup+" doublon"+(dup>1?"s":"")+" ignorГ©"+(dup>1?"s":""):""}</button>`;
    else inner+=`<div style="text-align:center;color:#475569;font-size:13px;padding:12px 0">${dup?"Toutes les analyses sont dГ©jГ  prГ©sentes.":"Aucune analyse valide."}</div>`;
    inner+=`<button class="btn-g" onclick="set({hthStep:'upload',hthRes:[]})">вҶҗ Charger d'autres PDF</button>`;
  }

  if(hthStep==="done"){
    inner=`<div style="text-align:center;padding:20px 0">
  <div style="font-size:48px;margin-bottom:12px">вң…</div>
  <div style="color:#4ade80;font-weight:700;font-size:16px;margin-bottom:6px">Import terminГ©</div>
  <div style="color:#e2e8f0;font-size:14px;margin-bottom:4px">${hthDone.i} analyse${hthDone.i>1?"s":""} importГ©e${hthDone.i>1?"s":""}</div>
  ${hthDone.s?`<div style="color:#475569;font-size:12px;margin-bottom:16px">${hthDone.s} ignorГ©e${hthDone.s>1?"s":""} (doublons / erreurs)</div>`:""}
  <button class="btn" onclick="closeHTH()">Voir les clients вҶ’</button>
</div>`;
  }

  return`<div class="overlay"><div class="sheet">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
  <div><div style="font-weight:800;font-size:16px;color:#e2e8f0">рҹ“„ Import HTH Test'O</div><div style="font-size:11px;color:#475569;margin-top:2px">Valeurs brutes В· Multi-PDF В· Doublons ignorГ©s</div></div>
  <button onclick="closeHTH()" style="background:#1a3356;border:none;color:#94a3b8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px">вң•</button>
</div>
${inner}
</div></div>`;
}

window.addClient=()=>{
  if(!S.nName.trim()||!S.nVol)return;
  const id=S.nName.trim().toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
  const clients={...S.clients,[id]:{name:S.nName.trim(),vol:parseFloat(S.nVol),mode:S.nMode,analyses:[]}};
  lsSave(clients);set({clients,sel:id,screen:"client",showAdd:false,nName:"",nVol:"",nMode:"chlore_non_stab"});
};

window.saveAnalyse=()=>{
  const {sel,clients,vals,aspect,algM}=S;
  const c=clients[sel];
  const pres=buildPres(vals,c.vol,c.mode,aspect,algM);
  const entry={date:new Date().toLocaleDateString("fr-FR"),ts:Date.now(),vals:{...vals},aspect,algMoutarde:algM,filtreLave:S.filtreLave,filtrationMode:S.filtrationMode,pres};
  const updated={...clients,[sel]:{...c,analyses:[...(c.analyses||[]),entry]}};
  lsSave(updated);set({clients:updated,pres:entry,screen:"ordonnance"});
};

window.onPhoto=async function(input){
  const file=input.files?.[0];if(!file)return;
  set({pMsg:"рҹ“· Lecture du photomГЁtre en coursвҖҰ"});
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const parsed=await readPhoto(b64,file.type||"image/jpeg");
    const vals={...S.vals};
    PKS.forEach(k=>{if(parsed[k]!=null)vals[k]=String(parsed[k]);});
    set({vals,pMsg:`вң… ${Object.values(parsed).filter(v=>v!==null).length} valeur(s) extraite(s) вҖ” vГ©rifie et complГЁte si besoin`});
  }catch{set({pMsg:"вқҢ Erreur lecture вҖ” saisis manuellement"});}
  input.value="";
};

window.openHTH=()=>set({showHTH:true,hthStep:"upload",hthRes:[]});
window.closeHTH=()=>set({showHTH:false});
window.hthCreate=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],createNew:v};set({hthRes:r});};
window.hthVol=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],newVol:v};set({hthRes:r});};
window.hthMode=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],newMode:v};set({hthRes:r});};

function findCli(name){
  if(!name)return null;
  const n=name.toLowerCase().trim();
  const f=Object.entries(S.clients).find(([,c])=>c.name.toLowerCase()===n||c.name.toLowerCase().includes(n)||n.includes(c.name.toLowerCase()));
  return f?f[0]:null;
}
function isDup(id,date){
  if(!id||!date)return false;
  return(S.clients[id]?.analyses||[]).some(a=>a.date===date);
}

window.onHTH=async function(input){
  const files=Array.from(input.files||[]).filter(f=>f.type==="application/pdf");
  if(!files.length)return;
  set({hthStep:"processing",hthProg:{c:0,t:files.length}});
  const results=[];
  for(let i=0;i<files.length;i++){
    set({hthProg:{c:i+1,t:files.length}});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(files[i]);});
      const p=await readHTH(b64);
      if(!p||(!p.clientName&&!p.FCL&&!p.pH)){results.push({fileName:files[i].name,parsed:null,status:"error",error:"Lecture impossible"});continue;}
      p.TCL=Math.round(((parseFloat(p.FCL)||0)+(parseFloat(p.CCL)||0))*100)/100;
      const cid=findCli(p.clientName);
      const dup=isDup(cid,p.date);
      results.push({fileName:files[i].name,parsed:p,status:dup?"doublon":"ok",clientId:cid||null,createNew:!cid,newVol:p.volume?String(p.volume):"",newMode:p.mode||"chlore_non_stab"});
    }catch(err){
      const msg=err?.message?.includes("fetch")||err?.message?.includes("network")?"Erreur rГ©seau вҖ” vГ©rifie ta connexion":"Erreur technique ("+( err?.message||"inconnue")+")";
      results.push({fileName:files[i].name,parsed:null,status:"error",error:msg});
    }
  }
  set({hthRes:results,hthStep:"results"});
  input.value="";
};

window.confirmHTH=function(){
  let upd={...S.clients};let i=0,s=0;
  S.hthRes.forEach(r=>{
    if(r.status!=="ok"||!r.parsed){s++;return;}
    const p=r.parsed;
    const vals={FCL:p.FCL!=null?String(p.FCL):"",TCL:p.TCL!=null?String(p.TCL):"",pH:p.pH!=null?String(p.pH):"",TAC:p.TAC!=null?String(p.TAC):"",TH:p.TH!=null?String(p.TH):"",CYA:p.CYA!=null?String(p.CYA):"",Fe:p.Fe!=null?String(p.Fe):"",Cu:p.Cu!=null?String(p.Cu):"",Phos:p.Phos!=null?String(p.Phos):""};
    const date=p.date||new Date().toLocaleDateString("fr-FR");
    const pName=(p.clientName||'').toLowerCase().trim();
    let tid=pName?Object.entries(upd).find(([,c])=>c.name.toLowerCase().trim()===pName)?.[0]:r.clientId;
    if(!tid){
      const id=(p.clientName||"nouveau").toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,4);
      upd[id]={name:p.clientName||"Client HTH",vol:parseFloat(r.newVol)||parseFloat(p.volume)||0,mode:r.newMode||"chlore_non_stab",analyses:[]};
      tid=id;
    }
    const pres=buildPres(vals,upd[tid].vol,upd[tid].mode,"claire",false);
    upd[tid]={...upd[tid],analyses:[...(upd[tid].analyses||[]),{date,ts:Date.now(),vals,aspect:"claire",algMoutarde:false,pres,sourceHTH:true}]};
    i++;
  });
  lsSave(upd);
  set({clients:upd,hthStep:"done",hthDone:{i,s}});
};
