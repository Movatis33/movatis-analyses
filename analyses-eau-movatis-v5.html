<script>
const SK="movatis_v3";
const DEMO={};
const PRODS={RITOCAL_GR:{n:"RITOCAL GR",r:"PM-531"},ACTIBON:{n:"ACTIBON SHOCK",r:"PM-420"},ALGIKLEAN:{n:"ALGIKLEAN",r:"PM-634"},ALGI_YELLOW:{n:"ALGI-YELLOW",r:"PM-654"},PH_MOINS:{n:"pH MOINS",r:"PM-601"},TAC_PLUS:{n:"TAC PLUS",r:"PM-612"},STABILISANT:{n:"STABILISANT",r:"PM-401"},PHOS_OUT:{n:"PHOS-OUT",r:"PM-625"},BIOFILM_OUT:{n:"BIOFILM OUT",r:"PM-630"},ULTRA_CLEAR:{n:"ULTRA CLEAR",r:"PM-643"},ION_MAGNETIC:{n:"ION MAGNETIC",r:"PM-615"},STICKS_CTX:{n:"Sticks chlore non stabilisé",r:"CTX-123"},CELNET:{n:"CELNET",r:"PM-142"}};
const PR={FCL:{min:1,max:3,u:"mg/L",lb:"Chlore Libre"},TCL:{min:1,max:3.6,u:"mg/L",lb:"Chlore Total"},pH:{min:7,max:7.4,u:"",lb:"pH"},TAC:{min:80,max:180,u:"mg/L",lb:"TAC / ALK"},TH:{min:150,max:350,u:"mg/L",lb:"TH / HARD"},CYA:{min:20,max:40,u:"mg/L",lb:"CYA (Stab.)"},Fe:{min:0,max:0.2,u:"mg/L",lb:"Fer / IRON"},Cu:{min:0,max:0.1,u:"mg/L",lb:"Cuivre / COPPER"},Phos:{min:0,max:100,u:"ppb",lb:"Phosphates / PHOS"}};
const PKS=Object.keys(PR);
const ML={chlore_non_stab:"Sticks non stab.",chlore_stab:"Chlore stab.",electrolyseur:"Électrolyse",uv:"UV",brome:"Brome"};
const COL={FCL:"#38bdf8",TCL:"#818cf8",pH:"#4ade80",TAC:"#fb923c",TH:"#f472b6",CYA:"#facc15",Fe:"#f87171",Cu:"#a78bfa",Phos:"#34d399"};

function lsLoad(){try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch{}localStorage.setItem(SK,JSON.stringify(DEMO));return JSON.parse(JSON.stringify(DEMO));}
function lsSave(d){
  try{
    localStorage.setItem(SK,JSON.stringify(d));
  }catch(err){
    if(err.name==="QuotaExceededError"||err.code===22){
      set({dvMsg:"⚠️ Stockage plein ! Exportez vos données immédiatement puis supprimez des entrées."});
      alert("⚠️ Stockage local plein !\n\nVos données ne peuvent plus être sauvegardées.\n→ Exportez le fichier JSON depuis l'accueil, puis supprimez quelques analyses anciennes.");
    }
  }
}

function dot(v,k){
  if(v===""||v===null||v===undefined)return"⚪";
  const r=PR[k];if(!r)return"⚪";
  const n=parseFloat(v);if(isNaN(n))return"⚪";
  if(n>=r.min&&n<=r.max)return"🟢";
  const p=(r.max-r.min)*.25||.5;
  if((n>=r.min-p&&n<r.min)||(n>r.max&&n<=r.max+p))return"🟠";
  return"🔴";
}
function inpCls(v,k){if(!v)return"";const d=dot(v,k);return d==="🟢"?"inp-ok":d==="🟠"?"inp-w":"inp-e";}

function calcLSI(pH,TH,TAC,t=28){
  if(!pH||!TH||!TAC)return null;
  const f=t<=15?.5:t<=20?.6:t<=25?.7:.8;
  return(parseFloat(pH)-(12.1-Math.log10(parseFloat(TH))-Math.log10(parseFloat(TAC))-f)).toFixed(2);
}

function buildPres(vals,vol,mode,aspect,algM){
  const at=[],ac=[],pr={},wa=[];
  const fcl=parseFloat(vals.FCL)||0,ph=parseFloat(vals.pH)||0,tac=parseFloat(vals.TAC)||0,th=parseFloat(vals.TH)||0,cya=parseFloat(vals.CYA),phos=parseFloat(vals.Phos)||0;
  const cc=(parseFloat(vals.TCL)||0)-fcl;
  const isV=aspect==="verte_légère"||aspect==="verte_dense";
  const isD=aspect==="verte_dense"||aspect==="noire_marron";
  if(cc>0.6)wa.push("⚠️ Chlore combiné > 0,6 mg/L — traitement choc obligatoire");
  if(isD){
    at.push("Laver le filtre AVANT tout traitement");at.push("Brosser les parois");
    pr.BIOFILM_OUT=Math.round(vol*5)+" mL";at.push("BIOFILM OUT → "+pr.BIOFILM_OUT);
    if(fcl<0.5){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR → "+pr.RITOCAL_GR+" — répartir plan d'eau, filtration en marche");}
    pr.ACTIBON=Math.round(vol*10)+" mL";at.push("ACTIBON SHOCK → "+pr.ACTIBON+" (×2) — soirée");
    pr.ALGIKLEAN=Math.round(vol*20)+" mL";at.push("ALGIKLEAN → "+pr.ALGIKLEAN+" — filtration en marche");
    pr.ULTRA_CLEAR=Math.round(vol*10)+" mL";at.push("ULTRA CLEAR → "+pr.ULTRA_CLEAR);
    ac.push("Filtration 24h/24 pendant 48–72h");ac.push("Laver le filtre à nouveau 24h après");ac.push("Ne pas baigner tant que l'eau n'est pas claire");ac.push("Ne pas poser les sticks avant eau claire + conditions OK");
    if(mode==="electrolyseur"){ac.push("Ne pas remettre l'électrolyseur avant eau claire + pH 7,0–7,4 + TAC > 80");wa.push("⚠️ Électrolyseur : proposer CELNET");pr.CELNET="Selon encrassement";}
  }else if(aspect==="verte_légère"){
    at.push("Brosser les parois");
    if(fcl<0.5){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR → "+pr.RITOCAL_GR);}
    pr.ALGIKLEAN=Math.round(vol*20)+" mL";at.push("ALGIKLEAN → "+pr.ALGIKLEAN+" — filtration en marche");
    pr.ACTIBON=Math.round(vol*5)+" mL";at.push("ACTIBON SHOCK → "+pr.ACTIBON+" — soirée");
    ac.push("Laver filtre 24h après");ac.push("Filtration 24h/24 pendant 48h");ac.push("Ne pas baigner — FCL ≥ 1 mg/L + eau claire requis");
  }
  if(algM){pr.ALGI_YELLOW=Math.round(vol*10)+" mL";at.push("ALGI-YELLOW → "+pr.ALGI_YELLOW+" — surchloration cible 5 mg/L");wa.push("⚠️ Algues moutarde : surchloration 5 mg/L requise");}
  if(ph>(isV?6.9:7.5)&&ph>0){const d=Math.round(vol*10*((ph-(isV?6.8:7.2))/0.3));pr.PH_MOINS=d+" g";at.push("pH MOINS PM-601 → "+d+" g — 10g/m³ par -0,3 unité, en 3 fois, filtration 1h après");}
  if(tac>0&&tac<80){
    if(ph<6.3)wa.push("🔴 pH < 6,3 — NE PAS ajouter TAC PLUS. Corriger pH d'abord.");
    else{const dl=80-tac,d=Math.round(dl*vol*1.7);pr.TAC_PLUS=d+" g";at.push("TAC PLUS → "+d+" g"+(dl>20?" (correction massive)":""));if(dl>30){ac.push("Filtration 24h/24 pendant la correction TAC");ac.push("Couper la régulation pH automatique");wa.push("⚠️ Correction TAC massive — filtration 24h + couper régulation pH auto");}}
  }
  if(th>0&&th<150)wa.push("⚠️ TH < 150 mg/L — eau agressive.");
  if(!isNaN(cya)){if(cya<20){const d=Math.round((30-cya)*vol*1);pr.STABILISANT=d+" g";at.push("STABILISANT PM-401 → "+d+" g — 10g/m³ par +10ppm, 48h pour agir — prévenir client");wa.push("⚠️ CYA < 20 mg/L — STABILISANT obligatoire. Met 48h à agir.");}else if(cya>40){const cyaCible=30,vDrain=Math.round(vol*(cya-cyaCible)/cya*10)/10;wa.push("⚠️ CYA "+cya+" mg/L — dépassement seuil max 40 mg/L.");at.push("Vidanger "+vDrain+" m³ et remplacer par eau claire — ramène CYA à ~"+cyaCible+" mg/L");pr.VIDANGE_CYA=vDrain+" m³";}}
  if(phos>100){const d=phos<=200?Math.round(vol*3):phos<=500?Math.round(vol*6):phos<=1000?Math.round(vol*12):Math.round(vol*24);pr.PHOS_OUT=d+" mL";at.push("PHOS-OUT → "+d+" mL — traiter AVANT l'algicide");wa.push("⚠️ Phosphates > 100 ppb — PHOS-OUT avant algicide");}
  if((parseFloat(vals.Fe)||0)>0.2||(parseFloat(vals.Cu)||0)>0.1){pr.ION_MAGNETIC="À évaluer";wa.push("⚠️ Métaux détectés — ION MAGNETIC recommandé");}
  if(aspect==="claire"&&mode!=="electrolyseur"){const n=Math.ceil(vol/20);pr.STICKS_CTX=n+" stick(s) / 5 jours";at.push("Poser "+n+" stick(s) skimmer — film intact, panier propre");}
  if(mode==="electrolyseur"&&fcl<0.5&&!pr.RITOCAL_GR){pr.RITOCAL_GR=Math.round(vol*13)+" g";at.push("RITOCAL GR → "+pr.RITOCAL_GR+" — amorçage électrolyseur");wa.push("⚠️ Électrolyseur : amorcer RITOCAL GR avant remise en route");}
  return{actions_tech:at,actions_client:ac,products:pr,warnings:wa};
}

// ── CLAUDE API ────────────────────────────────────
async function claude(messages,max=600){
  if(!S.apiKey){throw new Error("Clé API manquante — configure-la dans ⚙️ Paramètres");}
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":S.apiKey},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages})});
  if(!r.ok){const t=await r.text().catch(()=>"");throw new Error(`API ${r.status}: ${t.slice(0,120)}`);}
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||"Erreur API Claude");
  const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
  try{return JSON.parse(raw.replace(/```json|```/g,"").trim());}catch{return{};}
}
async function readPhoto(b64,mime){return claude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:'Analyse cette image de test d\'eau de piscine. Il peut s\'agir d\'une BANDELETTE colorimétrique (Hach, Bayrol, AquaChek, Marina...) tenue devant son flacon avec l\'échelle de référence, ou d\'un PHOTOMÈTRE numérique (PoolLab, Scuba II, eXact...), ou d\'un comparateur liquide.\n\nPOUR UNE BANDELETTE : compare soigneusement les couleurs de chaque plage de la bandelette avec l\'échelle imprimée sur le flacon. Chaque plage correspond à un paramètre. La lecture est approximative — retourne la valeur de l\'échelle la plus proche de la couleur observée.\n\nJSON STRICT uniquement, aucun texte avant ou après :\n{"FCL":null,"TCL":null,"pH":null,"TAC":null,"TH":null,"CYA":null,"Fe":null,"Cu":null,"Phos":null}\n\nCorrespondances : FCL=Free Chlorine/Chlore Libre(mg/L), TCL=Total Chlorine(mg/L), pH=valeur pH, TAC=Alkalinity/Alcalinité(ppm), TH=Hardness/TH(ppm), CYA=Stabilizer/Stabilisant(ppm), Fe=Iron/Fer(mg/L), Cu=Copper/Cuivre(mg/L), Phos=Phosphates(ppb). Nombres uniquement, null si absent ou illisible.'}]}],500);}
async function readHTH(b64){return claude([{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:'Rapport HTH Test\'O Pro. Extrais UNIQUEMENT les valeurs mesurées (pas les idéales). JSON STRICT:\n{"clientName":null,"date":null,"TAC":null,"pH":null,"CYA":null,"FCL":null,"CCL":null,"salt":null,"TH":null,"Cu":null,"Fe":null,"Phos":null,"volume":null,"mode":null}\nclientName=nom client, date=JJ/MM/AAAA, TAC=ALK, FCL=F Cl (chlore libre), CCL=chlore combiné, TH=HARD, Cu=COPPER, Fe=IRON, Phos=PHOS(ppb), volume=m³, mode="electrolyseur"/"chlore_non_stab"/"chlore_stab"/"brome"/"uv"/null. Ne pas extraire les recommandations HTH.'}]}],600);}

const DRIVE_FOLDER_ID="1pplP7oC8Vkue24sWScSTqkOamC5AP0Fx";
const GOOGLE_CLIENT_ID="782935774647-ob4eho1t82dsfs8asemu1qr4ffma01um.apps.googleusercontent.com";
async function exportJSON(){
  const d=new Date();
  const stamp=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const filename="movatis_backup_"+stamp+".json";
  const data=JSON.stringify(S.clients,null,2);
  set({dvMsg:"⏳ Sauvegarde Drive en cours…",exportAlert:false});
  try{
    // 1. Chercher si un fichier du même nom existe déjà
    const token=await getGoogleToken();
    const searchResp=await fetch(
      "https://www.googleapis.com/drive/v3/files?q=name%3D%27"+encodeURIComponent(filename)+"%27+and+%27"+DRIVE_FOLDER_ID+"%27+in+parents+and+trashed%3Dfalse&fields=files(id)",
      {headers:{"Authorization":"Bearer "+token}}
    );
    const searchData=await searchResp.json();
    const existingId=searchData.files&&searchData.files[0]?searchData.files[0].id:null;
    const meta={name:filename,mimeType:"application/json",...(existingId?{}:{parents:[DRIVE_FOLDER_ID]})};
    const body=new Blob([JSON.stringify(meta)],{type:"application/json"});
    const file=new Blob([data],{type:"application/json"});
    const form=new FormData();
    form.append("metadata",body);
    form.append("file",file);
    const url=existingId
      ?"https://www.googleapis.com/upload/drive/v3/files/"+existingId+"?uploadType=multipart"
      :"https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
    const method=existingId?"PATCH":"POST";
    const resp=await fetch(url,{method,headers:{"Authorization":"Bearer "+token},body:form});
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    localStorage.setItem("movatis_last_export",stamp);
    set({dvMsg:"✅ Sauvegardé sur Drive — "+filename,exportAlert:false});
  }catch(err){
    // Fallback : téléchargement local
    const url=URL.createObjectURL(new Blob([data],{type:"application/json"}));
    const a=document.createElement("a");
    a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    localStorage.setItem("movatis_last_export",stamp);
    set({dvMsg:"⚠️ Drive inaccessible — fichier téléchargé localement",exportAlert:false});
  }
}
async function getGoogleToken(){
  // Token en cache valide ?
  if(window._gToken&&window._gTokenExp&&Date.now()<window._gTokenExp){
    return window._gToken;
  }
  return new Promise((resolve,reject)=>{
    const redirect=encodeURIComponent(window.location.origin+window.location.pathname);
    const url="https://accounts.google.com/o/oauth2/v2/auth"
      +"?client_id="+encodeURIComponent(GOOGLE_CLIENT_ID)
      +"&redirect_uri="+redirect
      +"&response_type=token"
      +"&scope="+encodeURIComponent("https://www.googleapis.com/auth/drive.file")
      +"&prompt=select_account";
    const popup=window.open(url,"_blank","width=500,height=600,left=200,top=100");
    if(!popup){reject(new Error("Popup bloquée — autorise les popups pour ce site"));return;}
    const timer=setInterval(()=>{
      try{
        const loc=popup.location.href;
        if(loc.includes("access_token")){
          clearInterval(timer);
          const params=new URLSearchParams(loc.split("#")[1]||loc.split("?")[1]||"");
          const token=params.get("access_token");
          const exp=parseInt(params.get("expires_in")||"3600")*1000;
          if(token){
            window._gToken=token;
            window._gTokenExp=Date.now()+exp-60000;
            popup.close();
            resolve(token);
          }else{
            popup.close();
            reject(new Error("Token non reçu"));
          }
        }
        if(popup.closed){clearInterval(timer);reject(new Error("Popup fermée"));}
      }catch(e){/* cross-origin — attendre */}
    },300);
  });
}
function importJSON(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(typeof data!=="object"||Array.isArray(data))throw new Error("Format invalide");
      if(Object.keys(S.clients).length>0&&!confirm(`Cela va remplacer ${Object.keys(S.clients).length} client(s) existant(s). Confirmer ?`))return;
      lsSave(data);
      set({clients:data,dvMsg:"✅ "+Object.keys(data).length+" client(s) restauré(s)"});
    }catch{set({dvMsg:"❌ Fichier invalide — vérifiez qu'il s'agit d'un backup Movatis"});}
  };
  reader.readAsText(file);
}

// ── UTILS HTML ────────────────────────────────────
function e(s){if(!s&&s!==0)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function j(o){return JSON.stringify(o).replace(/</g,"\\u003c").replace(/"/g,"&quot;");}

function spark(data,color,w=180,h=44,tMin=null,tMax=null){
  if(!data||data.length<2)return"<span style='color:#555;font-size:11px'>—</span>";
  const vs=data.map(d=>parseFloat(d)||0);
  const allV=[...vs];if(tMin!==null)allV.push(tMin);if(tMax!==null)allV.push(tMax);
  const mn=Math.min(...allV),mx=Math.max(...allV),rng=mx-mn||1;
  const pad=3;
  function yp(v){return h-((v-mn)/rng)*(h-pad*2)-pad;}
  const pts=vs.map((v,i)=>`${(i/(vs.length-1))*w},${yp(v)}`).join(" ");
  const zone=(tMin!==null&&tMax!==null)?`<rect x="0" y="${yp(tMax)}" width="${w}" height="${Math.abs(yp(tMin)-yp(tMax))}" fill="#22c55e14" rx="2"/>` :"";
  const lMin=tMin!==null?`<line x1="0" y1="${yp(tMin)}" x2="${w}" y2="${yp(tMin)}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.75"/><text x="${w+4}" y="${yp(tMin)+4}" font-size="8" fill="#22c55e" opacity="0.9">${tMin}</text>`:"";
  const lMax=tMax!==null?`<line x1="0" y1="${yp(tMax)}" x2="${w}" y2="${yp(tMax)}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.75"/><text x="${w+4}" y="${yp(tMax)+4}" font-size="8" fill="#22c55e" opacity="0.9">${tMax}</text>`:"";
  return`<svg width="${w+32}" height="${h}" style="overflow:visible">${zone}${lMin}${lMax}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>${vs.map((v,i)=>{const x=(i/(vs.length-1))*w,y=yp(v);return`<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"/>`;}).join("")}</svg>`;
}

// ── RENDER ────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=buildAll();
  if(S.showHTH)document.body.style.overflow="hidden";
  else document.body.style.overflow="";
}

function buildAll(){
  const {screen,clients,sel,pres,showHTH}=S;
  const client=sel?clients[sel]:null;
  const analyses=client?.analyses||[];
  let h=showHTH?buildHTH():"";
  if(screen==="home")h+=buildHome();
  else if(screen==="client"&&client)h+=buildClient(client,analyses);
  else if(screen==="analyse"&&client)h+=buildAnalyse(client);
  else if(screen==="ordonnance"&&pres&&client)h+=buildOrd(pres,client);
  else if(screen==="history"&&client)h+=buildHist(client,analyses);
  return h;
}

// ── HISTORY ───────────────────────────────────────
function buildHist(client,analyses){
  let h=`<div class="screen">
<div class="hdr">
  <button class="hdr-back" onclick="set({screen:'client'})">← ${e(client.name)}</button>
  <div class="hdr-logo">📈 Évolution</div>
  <div class="hdr-sub">${analyses.length} analyses · ${analyses[0]?.date} → ${analyses[analyses.length-1]?.date}</div>
</div>
<div class="pad">`;
  PKS.forEach(k=>{
    const sa=[...analyses].sort((a,b)=>a.ts-b.ts);const pts=sa.map(a=>a.vals[k]).filter(v=>v!==""&&v!==undefined&&v!==null);
    if(!pts.length)return;
    const last=pts[pts.length-1];
    h+=`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div><span style="font-weight:700;font-size:14px">${PR[k].lb}</span><span style="font-size:11px;color:#7dd3fc;margin-left:6px">${PR[k].u}</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:800;font-size:16px;color:${COL[k]}">${last}</span><span style="font-size:18px">${dot(last,k)}</span></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:flex-end">
    ${spark(pts,COL[k],180,44,PR[k].min,PR[k].max)}
    <div style="font-size:12px;color:#94a3b8;text-align:right">${sa.filter(a=>a.vals[k]).map(a=>`<div>${a.date}: <b style="color:${COL[k]}">${a.vals[k]}</b></div>`).join("")}</div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:6px"><span>Min : ${PR[k].min}</span><span>Max : ${PR[k].max}</span></div>
</div>`;
  });
  h+=`<button class="btn-g" onclick="set({screen:'client'})">← Retour</button></div></div>`;
  return h;
}

// ── HTH MODAL ─────────────────────────────────────
function buildHTH(){
  const {hthStep,hthProg,hthRes,hthDone,clients}=S;
  const ok=hthRes.filter(r=>r.status==="ok").length;
  const dup=hthRes.filter(r=>r.status==="doublon").length;
  const err=hthRes.filter(r=>r.status==="error").length;
  let inner="";
  if(hthStep==="upload"){
    inner=`<div style="background:#070d1a;border:2px dashed #1e4976;border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer" onclick="document.getElementById('hthF').click()">
  <div style="font-size:40px;margin-bottom:8px">📄</div>
  <div style="color:#38bdf8;font-weight:700;font-size:14px">Sélectionner un ou plusieurs PDF</div>
  <div style="color:#475569;font-size:12px;margin-top:4px">Rapports HTH Test'O Pro</div>
</div>
<input type="file" id="hthF" accept="application/pdf" multiple style="display:none" onchange="onHTH(this)"/>`;
  }
  if(hthStep==="processing"){
    const pct=hthProg.t?Math.round(hthProg.c/hthProg.t*100):0;
    inner=`<div style="text-align:center;padding:24px 0">
  <div style="font-size:36px;margin-bottom:12px">⏳</div>
  <div style="color:#38bdf8;font-weight:700;font-size:15px;margin-bottom:6px">Analyse IA en cours…</div>
  <div style="color:#475569;font-size:13px;margin-bottom:16px">PDF ${hthProg.c} / ${hthProg.t}</div>
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
</div>`;
  }
  if(hthStep==="results"){
    inner=`<div class="g3" style="margin-bottom:14px">
  <div class="stat" style="background:#0a2a1a;border:1px solid #166534"><div class="n" style="color:#4ade80">${ok}</div><div class="l">À importer</div></div>
  <div class="stat" style="background:#1a2a0a;border:1px solid #3a4a1a"><div class="n" style="color:#facc15">${dup}</div><div class="l">Doublons</div></div>
  <div class="stat" style="background:#2a0a0a;border:1px solid #7f1d1d"><div class="n" style="color:#f87171">${err}</div><div class="l">Erreurs</div></div>
</div>`;
    hthRes.forEach((r,idx)=>{
      const bc=r.status==="doublon"?"#3a4a1a":r.status==="error"?"#7f1d1d":"#1e4976";
      const sc=r.status==="ok"?"#4ade80":r.status==="doublon"?"#facc15":"#f87171";
      const sl=r.status==="ok"?"✅ OK":r.status==="doublon"?"⚠️ Doublon":"❌ Erreur";
      inner+=`<div style="background:#070d1a;border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid ${bc}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.parsed?6:0}px">
    <div style="font-size:11px;color:#64748b;flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(r.fileName)}</div>
    <div style="font-size:11px;font-weight:700;color:${sc};flex-shrink:0">${sl}</div>
  </div>`;
      if(r.status==="error")inner+=`<div style="font-size:11px;color:#f87171">${e(r.error)}</div>`;
      if(r.parsed){
        const mc=r.clientId?clients[r.clientId]:null;
        inner+=`<div style="font-weight:700;font-size:14px;color:#e2e8f0">${e(r.parsed.clientName||"—")}</div>
<div style="font-size:11px;color:#475569;margin-top:2px">${e(r.parsed.date||"?")} · ${r.parsed.volume?r.parsed.volume+" m³ · ":""}FCL ${r.parsed.FCL??""} · pH ${r.parsed.pH??""} · TAC ${r.parsed.TAC??""} · Phos ${r.parsed.Phos??""}</div>`;
        if(r.status==="doublon")inner+=`<div style="font-size:11px;color:#facc15;margin-top:4px">Analyse du ${e(r.parsed.date)} déjà présente — ignorée</div>`;
        if(r.status==="ok"){
          if(mc&&!r.createNew){
            inner+=`<div style="font-size:11px;color:#4ade80;margin-top:4px">→ ${e(mc.name)} (${mc.vol} m³) <button onclick="hthCreate(${idx},true)" style="background:none;border:none;color:#475569;font-size:10px;cursor:pointer;margin-left:4px">Changer →</button></div>`;
          }else{
            inner+=`<div style="margin-top:8px"><div style="font-size:10px;color:#fb923c;font-weight:700;margin-bottom:6px">⚠️ Nouveau client — volume requis</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
  <div><div style="font-size:10px;color:#64748b;margin-bottom:3px">Volume m³</div><input type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" placeholder="Ex: 50" value="${e(r.newVol)}" style="padding:7px 10px;font-size:12px;margin-bottom:0" oninput="hthVol(${idx},this.value)"/></div>
  <div><div style="font-size:10px;color:#64748b;margin-bottom:3px">Mode</div>
    <select style="padding:7px 10px;font-size:11px;margin-bottom:0" onchange="hthMode(${idx},this.value)">
      ${["chlore_non_stab","chlore_stab","electrolyseur","uv","brome"].map(m=>`<option value="${m}"${r.newMode===m?" selected":""}>${ML[m]}</option>`).join("")}
    </select>
  </div>
</div></div>`;
          }
        }
      }
      inner+=`</div>`;
    });
    if(ok>0)inner+=`<button class="btn btn-ok" onclick="confirmHTH()">✅ Importer ${ok} analyse${ok>1?"s":""}${dup>0?" · "+dup+" doublon"+(dup>1?"s":"")+" ignoré"+(dup>1?"s":""):""}</button>`;
    else inner+=`<div style="text-align:center;color:#475569;font-size:13px;padding:12px 0">${dup?"Toutes les analyses sont déjà présentes.":"Aucune analyse valide."}</div>`;
    inner+=`<button class="btn-g" onclick="set({hthStep:'upload',hthRes:[]})">← Charger d'autres PDF</button>`;
  }
  if(hthStep==="done"){
    inner=`<div style="text-align:center;padding:20px 0">
  <div style="font-size:48px;margin-bottom:12px">✅</div>
  <div style="color:#4ade80;font-weight:700;font-size:16px;margin-bottom:6px">Import terminé</div>
  <div style="color:#e2e8f0;font-size:14px;margin-bottom:4px">${hthDone.i} analyse${hthDone.i>1?"s":""} importée${hthDone.i>1?"s":""}</div>
  ${hthDone.s?`<div style="color:#475569;font-size:12px;margin-bottom:16px">${hthDone.s} ignorée${hthDone.s>1?"s":""} (doublons / erreurs)</div>`:""}
  <button class="btn" onclick="closeHTH()">Voir les clients →</button>
</div>`;
  }
  return`<div class="overlay"><div class="sheet">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
  <div><div style="font-weight:800;font-size:16px;color:#e2e8f0">📄 Import HTH Test'O</div><div style="font-size:11px;color:#475569;margin-top:2px">Valeurs brutes · Multi-PDF · Doublons ignorés</div></div>
  <button onclick="closeHTH()" style="background:#1a3356;border:none;color:#94a3b8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px">✕</button>
</div>
${inner}
</div></div>`;
}

// ── VOICE NOTES (dictée → texte) ──────────────────
const VN_SK="movatis_vn";
function vnLoad(){try{const r=localStorage.getItem(VN_SK);return r?JSON.parse(r):{}}catch{return {};}}
function vnSave(d){try{localStorage.setItem(VN_SK,JSON.stringify(d));}catch{}}

function buildVoiceNotes(clientId){
  const vnDb=vnLoad();
  const notes=(vnDb[clientId]||[]).slice().sort((a,b)=>b.ts-a.ts);
  const show5=!S.vnShowAll;
  const visible=show5?notes.slice(0,5):notes;
  const listening=S.vnListening;
  let h=`<div class="card" style="border-color:#1a4060">
<div class="sec">🎙️ Notes de visite</div>`;

  if(!listening){
    h+=`<button class="btn" style="background:#0e4f6e;color:#e2e8f0;margin-bottom:10px" onclick="vnStart('${clientId}')">🎙️ Dicter une note</button>`;
  }else{
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#0a1628;border:1px solid #ef4444;border-radius:10px;padding:10px 14px">
  <div style="width:10px;height:10px;background:#ef4444;border-radius:50%;animation:vnblink 1s infinite;flex-shrink:0"></div>
  <div style="flex:1;font-size:13px;color:#fca5a5">Dictée en cours… parlez</div>
  <button onclick="vnStop()" style="background:#ef4444;border:none;color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer">⏹ Stop</button>
</div>`;
  }

  if(!visible.length){
    h+=`<div style="font-size:12px;color:#64748b;text-align:center;padding:6px 0">Aucune note</div>`;
  }else{
    visible.forEach(n=>{
      const d=new Date(n.ts);
      const label=d.toLocaleDateString("fr-FR")+" "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      const editing=S.vnEditTs===n.ts;
      if(editing){
        h+=`<div style="background:#070d1a;border:1px solid #38bdf8;border-radius:10px;padding:10px 12px;margin-bottom:8px">
  <div style="font-size:10px;color:#475569;margin-bottom:6px">${label}</div>
  <textarea id="vnEditArea_${n.ts}" style="width:100%;min-height:80px;font-size:13px;line-height:1.5;margin-bottom:8px">${e(n.text)}</textarea>
  <div class="row">
    <button class="btn btn-ok" style="flex:1;margin-bottom:0;padding:8px" onclick="vnSaveEdit('${clientId}',${n.ts})">✓ Sauvegarder</button>
    <button class="btn-g" style="flex:1;margin-bottom:0;padding:8px" onclick="set({vnEditTs:null})">Annuler</button>
  </div>
</div>`;
      }else{
        h+=`<div style="background:#070d1a;border:1px solid #1a3356;border-radius:10px;padding:10px 12px;margin-bottom:8px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
    <div style="flex:1;cursor:pointer" onclick="set({vnEditTs:${n.ts}})">
      <div style="font-size:10px;color:#475569;margin-bottom:4px">${label}</div>
      <div style="font-size:13px;line-height:1.5;color:#e2e8f0">${e(n.text)}</div>
    </div>
    <button onclick="vnDelete('${clientId}',${n.ts})" style="background:none;border:none;color:#475569;font-size:14px;cursor:pointer;flex-shrink:0;margin-top:1px">🗑</button>
  </div>
</div>`;
      }
    });
    if(notes.length>5){
      if(show5){
        h+=`<button class="btn-g" style="font-size:12px;padding:7px 14px;margin-bottom:0" onclick="set({vnShowAll:true})">Voir ${notes.length-5} note(s) plus ancienne(s)</button>`;
      }else{
        h+=`<button class="btn-g" style="font-size:12px;padding:7px 14px;margin-bottom:0" onclick="set({vnShowAll:false})">Réduire</button>`;
      }
    }
  }
  h+=`</div>`;
  return h;
}

window.saveClientInfo=()=>{
  const id=S.sel;if(!id||!S.clients[id])return;
  const vol=parseFloat(String(S.eVol).replace(",","."));
  if(isNaN(vol)||vol<=0)return;
  const name=S.eName.trim()||S.clients[id].name;
  const upd={...S.clients};
  upd[id]={...upd[id],vol,mode:S.eMode||upd[id].mode,name};
  lsSave(upd);
  set({clients:upd,showEditClient:false});
};
window.deleteClient=(id)=>{
  if(!confirm(`Supprimer définitivement ce client et toutes ses analyses ?`))return;
  const upd={...S.clients};delete upd[id];
  lsSave(upd);set({clients:upd,sel:null,screen:"home"});
};
window.deleteAnalyse=(clientId,ts)=>{
  if(!confirm(`Supprimer cette analyse ?`))return;
  const upd={...S.clients};
  upd[clientId]={...upd[clientId],analyses:(upd[clientId].analyses||[]).filter(a=>a.ts!==ts)};
  lsSave(upd);set({clients:upd});
};
window.shareMail=()=>{
  const t=document.getElementById("mailTxt");
  if(!t)return;
  if(navigator.share){navigator.share({text:t.value}).catch(()=>{});}
  else{navigator.clipboard?.writeText(t.value);alert("Mail copié dans le presse-papiers");}
};
window.goAnalyse=()=>set({screen:"analyse",vals:{FCL:"",TCL:"",pH:"",TAC:"",TH:"",CYA:"",Fe:"",Cu:"",Phos:""},aspect:"claire",algM:false,filtreLave:false,filtrationMode:"habituel",pMsg:""});

window.setTextField=function(key,input){Object.assign(S,{[key]:input.value});};

window.addClient=()=>{
  if(!S.nName.trim()||!S.nVol)return;
  const id=S.nName.trim().toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();
  const clients={...S.clients,[id]:{name:S.nName.trim(),vol:parseFloat(S.nVol),mode:S.nMode,analyses:[]}};
  lsSave(clients);set({clients,sel:id,screen:"client",showAdd:false,nName:"",nVol:"",nMode:"chlore_non_stab"});
};

window.saveAnalyse=()=>{
  const {sel,clients,vals,aspect,algM}=S;
  const missing=[];
  if(!vals.pH) missing.push("pH");
  if(!vals.TAC) missing.push("TAC");
  if(!vals.FCL) missing.push("Chlore Libre");
  if(missing.length&&!confirm(`Attention : ${missing.join(", ")} non renseigné(s). Continuer quand même ?`))return;
  const c=clients[sel];
  const pres=buildPres(vals,c.vol,c.mode,aspect,algM);
  const entry={date:new Date().toLocaleDateString("fr-FR"),ts:Date.now(),vals:{...vals},aspect,algMoutarde:algM,filtreLave:S.filtreLave,filtrationMode:S.filtrationMode,pres};
  const updated={...clients,[sel]:{...c,analyses:[...(c.analyses||[]),entry]}};
  lsSave(updated);set({clients:updated,pres:entry,screen:"ordonnance"});
};

window.onPhoto=async function(input){
  const file=input.files?.[0];if(!file)return;
  set({pMsg:"📷 Lecture du photomètre en cours…"});
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const parsed=await readPhoto(b64,file.type||"image/jpeg");
    const vals={...S.vals};
    PKS.forEach(k=>{if(parsed[k]!=null)vals[k]=String(parsed[k]);});
    set({vals,pMsg:`✅ ${Object.values(parsed).filter(v=>v!==null).length} valeur(s) extraite(s) — vérifie et complète si besoin`});
  }catch(err){set({pMsg:"❌ "+(err?.message?.includes("Clé API")?"Clé API manquante — configure-la dans ⚙️":err?.message||"Erreur lecture — saisis manuellement")});}
  input.value="";
};

window.openHTH=()=>set({showHTH:true,hthStep:"upload",hthRes:[]});
window.closeHTH=()=>set({showHTH:false});
window.hthCreate=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],createNew:v};set({hthRes:r});};
window.hthVol=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],newVol:v};set({hthRes:r});};
window.hthMode=(i,v)=>{const r=[...S.hthRes];r[i]={...r[i],newMode:v};set({hthRes:r});};

function findCli(name){
  if(!name)return null;
  const n=name.toLowerCase().trim();
  const f=Object.entries(S.clients).find(([,c])=>c.name.toLowerCase()===n||c.name.toLowerCase().includes(n)||n.includes(c.name.toLowerCase()));
  return f?f[0]:null;
}
function isDup(id,date){
  if(!id||!date)return false;
  return(S.clients[id]?.analyses||[]).some(a=>a.date===date);
}

window.onHTH=async function(input){
  const files=Array.from(input.files||[]).filter(f=>f.type==="application/pdf");
  if(!files.length)return;
  set({hthStep:"processing",hthProg:{c:0,t:files.length}});
  const results=[];
  for(let i=0;i<files.length;i++){
    set({hthProg:{c:i+1,t:files.length}});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(files[i]);});
      const p=await readHTH(b64);
      if(!p||(!p.clientName&&!p.FCL&&!p.pH)){results.push({fileName:files[i].name,parsed:null,status:"error",error:"Lecture impossible"});continue;}
      p.TCL=Math.round(((parseFloat(p.FCL)||0)+(parseFloat(p.CCL)||0))*100)/100;
      const cid=findCli(p.clientName);
      const dup=isDup(cid,p.date);
      results.push({fileName:files[i].name,parsed:p,status:dup?"doublon":"ok",clientId:cid||null,createNew:!cid,newVol:p.volume?String(p.volume):"",newMode:p.mode||"chlore_non_stab"});
    }catch(err){
      const msg=err?.message?.includes("fetch")||err?.message?.includes("network")?"Erreur réseau — vérifie ta connexion":"Erreur technique ("+( err?.message||"inconnue")+")";
      results.push({fileName:files[i].name,parsed:null,status:"error",error:msg});
    }
  }
  set({hthRes:results,hthStep:"results"});
  input.value="";
};

window.confirmHTH=function(){
  let upd={...S.clients};let i=0,s=0;
  S.hthRes.forEach(r=>{
    if(r.status!=="ok"||!r.parsed){s++;return;}
    const p=r.parsed;
    const vals={FCL:p.FCL!=null?String(p.FCL):"",TCL:p.TCL!=null?String(p.TCL):"",pH:p.pH!=null?String(p.pH):"",TAC:p.TAC!=null?String(p.TAC):"",TH:p.TH!=null?String(p.TH):"",CYA:p.CYA!=null?String(p.CYA):"",Fe:p.Fe!=null?String(p.Fe):"",Cu:p.Cu!=null?String(p.Cu):"",Phos:p.Phos!=null?String(p.Phos):""};
    const date=p.date||new Date().toLocaleDateString("fr-FR");
    const pName=(p.clientName||'').toLowerCase().trim();
    let tid=pName?Object.entries(upd).find(([,c])=>c.name.toLowerCase().trim()===pName)?.[0]:r.clientId;
    if(!tid){
      const id=(p.clientName||"nouveau").toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Date.now()+"_"+Math.random().toString(36).slice(2,4);
      upd[id]={name:p.clientName||"Client HTH",vol:parseFloat(r.newVol)||parseFloat(p.volume)||0,mode:r.newMode||"chlore_non_stab",analyses:[]};
      tid=id;
    }
    const pres=buildPres(vals,upd[tid].vol,upd[tid].mode,"claire",false);
    upd[tid]={...upd[tid],analyses:[...(upd[tid].analyses||[]),{date,ts:Date.now(),vals,aspect:"claire",algMoutarde:false,pres,sourceHTH:true}]};
    i++;
  });
  lsSave(upd);
  set({clients:upd,hthStep:"done",hthDone:{i,s}});
};

let _vnRecog=null;
window.vnStart=function(clientId){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Reconnaissance vocale non supportée sur ce navigateur.");return;}
  const r=new SR();
  r.lang="fr-FR";
  r.continuous=true;
  r.interimResults=false;
  let transcript="";
  r.onresult=ev=>{
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal)transcript+=ev.results[i][0].transcript+" ";
    }
  };
  r.onerror=()=>{set({vnListening:false});};
  r.onend=()=>{
    if(transcript.trim()){
      const vnDb=vnLoad();
      if(!vnDb[clientId])vnDb[clientId]=[];
      vnDb[clientId].push({ts:Date.now(),text:transcript.trim()});
      vnSave(vnDb);
    }
    set({vnListening:false});
  };
  r.start();
  _vnRecog=r;
  set({vnListening:true});
};
window.vnStop=function(){
  if(_vnRecog)try{_vnRecog.stop();}catch{}
};
window.vnSaveEdit=function(clientId,ts){
  const ta=document.getElementById("vnEditArea_"+ts);
  if(!ta)return;
  const newText=ta.value.trim();
  if(!newText)return;
  const vnDb=vnLoad();
  if(vnDb[clientId]){
    const n=vnDb[clientId].find(n=>n.ts===ts);
    if(n)n.text=newText;
    vnSave(vnDb);
  }
  set({vnEditTs:null});
};
window.vnDelete=function(clientId,ts){
  const vnDb=vnLoad();
  if(vnDb[clientId])vnDb[clientId]=vnDb[clientId].filter(n=>n.ts!==ts);
  vnSave(vnDb);
  render();
};

    'self.addEventListener("install",e=>{self.skipWaiting();e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href])).catch(()=>{}));});',
    'self.addEventListener("activate",e=>e.waitUntil(clients.claim()));',

    '  const url=e.request.url;',

S.clients=lsLoad();
(function checkFirstOpenToday(){
  const today=new Date().toISOString().slice(0,10);
  const lastOpen=localStorage.getItem("movatis_last_open")||"";
  if(lastOpen!==today){
    localStorage.setItem("movatis_last_open",today);
    const lastExport=localStorage.getItem("movatis_last_export")||"";
    const daysSince=lastExport?Math.floor((new Date(today)-new Date(lastExport))/(1000*60*60*24)):999;
    if(daysSince>0&&Object.keys(S.clients).length>0){
      S.exportAlert=true;
    }
  }
})();
render();
